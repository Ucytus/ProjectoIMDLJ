<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instituto Municipal de la Juventud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Instituto Municipal de la Juventud</h1>
    </header>

    <main>
        <div class="dropdown-container">
            <div class="dropdown">
                <label for="departamentos">Departamentos</label>
                <select id="departamentos">
                    <option value="" disabled selected>Selecciona un departamento</option>
                    <option value="servicio-social">Servicio social y prácticas</option>
                    <option value="bolsa-empleo">Bolsa de Empleo</option>
                    <option value="mercado-emprendedor">Mercado Emprendedor</option>
                    <option value="bonos-transporte">Bonos de transporte</option>
                    <option value="requisiciones">Requisiciones</option>
                </select>
            </div>

            <div class="dropdown">
                <label for="programas">Programas</label>
                <select id="programas">
                    <option value="" disabled selected>Selecciona un programa</option>
                    <option value="tarjeta-latido">Tarjeta latido joven</option>
                    <option value="descuento-ujed">Descuento UJED</option>
                    <option value="descuento-trilingue">Descuento C Universitario Trilingüe</option>
                    <option value="consultas-psicologicas">Consultas psicológicas</option>
                </select>
            </div>
        </div>
    </main>
</body>
</html>
